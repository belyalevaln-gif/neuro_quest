<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формула Восстановления - Nutricia</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #EEE9F2;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .phone-container {
            background-color: #EEE9F2;
            width: 100%;
            max-width: 412px;
            min-height: 750px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            position: relative;
        }

        /* Шапка игры */
        .header {
            text-align: left;
            margin-bottom: 25px;
        }
        .logo-main {
            font-size: 26px;
            font-weight: bold;
            color: #51267B;
            line-height: 1;
        }
        .logo-sub {
            font-size: 14px;
            color: #51267B;
            letter-spacing: 1px;
        }

        /* Прогресс-бар */
        .progress-container {
            margin-bottom: 40px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .progress-bar-bg {
            background-color: #FFFEFE;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background-color: #A45494;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Контентная зона */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        h2 {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .bold-text {
            font-weight: bold;
        }

        .list-instruction {
            margin-top: 25px;
            list-style: none;
        }
        .list-instruction li {
            font-size: 15px;
            margin-bottom: 8px;
        }
