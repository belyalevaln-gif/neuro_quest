<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Что помогает улучшить восстановление после инсульта</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --primary-purple: #6D28D9;
            --light-purple: #F5F3FF;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfd;
        }
        
        .progress-bar {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .purple-gradient {
            background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col">
        <!-- Progress Header -->
        <div class="sticky top-0 z-50 bg-white border-b border-purple-100">
            <div class="p-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-purple-400">Прогресс квеста</span>
                    <span id="progress-text" class="text-xs font-bold text-purple-700">0%</span>
                </div>
                <div class="w-full bg-purple-100 h-2 rounded-full overflow-hidden">
                    <div id="progress-line" class="progress-bar h-full purple-gradient" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main id="app-container" class="flex-1 p-6 flex flex-col justify-center">
            <!-- Content injected by JS -->
        </main>
    </div>

    <script>
        const CONFIG = {
            keys: {
                1: "nutridrink",
                2: "улучшает",
                3: "восстановление"
            },
            storageKey: 'med_quest_data'
        };

        let state = {
            step: 1,
            answers: { 1: null, 2: null, 3: null },
            isWinner: true
        };

        // Инициализация
        function init() {
            const saved = localStorage.getItem(CONFIG.storageKey);
            if (saved) {
                state = JSON.parse(saved);
            }
            render();
        }

        function save() {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(state));
        }

        function handleNext(inputId, stepNum) {
            const input = document.getElementById(inputId);
            const value = input.value.trim().toLowerCase();
            
            // Сохраняем ответ
            state.answers[stepNum] = value;
            
            // Если хоть один ответ неверный — флаг победителя сбрасывается
            if (value !== CONFIG.keys[stepNum].toLowerCase()) {
                state.isWinner = false;
            }

            state.step++;
            save();
            render();
        }

        function restart() {
            localStorage.removeItem(CONFIG.storageKey);
            state = { step: 1, answers: { 1: null, 2: null, 3: null }, isWinner: true };
            render();
        }

        function updateUI() {
            const percent = ((state.step - 1) / 3) * 100;
            document.getElementById('progress-line').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${Math.round(percent)}%`;
        }

        function render() {
            const container = document.getElementById('app-container');
            updateUI();

            if (state.step === 1) {
                container.innerHTML = `
                    <div class="step-transition">
                        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">Что помогает улучшить восстановление после инсульта</h1>
                        <div class="bg-purple-50 p-6 rounded-3xl mb-8 border border-purple-100">
                            <h2 class="font-bold text-purple-800 mb-2">Шаг 1: Диагностика</h2>
                            <p class="text-sm text-purple-700 leading-relaxed">Для начала квеста необходимо заполнить короткую анкету.</p>
                        </div>
                        <button onclick="window.open('https://forms.yandex.ru/cloud/69f8599584227c6ee20006a6', '_blank')" 
                                class="w-full purple-gradient text-white font-bold py-4 rounded-2xl shadow-lg mb-8 active:scale-95 transition-transform">
                            Заполнить анкету и получить ключ №1
                        </button>
                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-slate-400 ml-1">КЛЮЧ №1</label>
                            <input id="k1" type="text" placeholder="Введите слово..." class="w-full border-2 border-purple-100 rounded-2xl p-4 focus:border-purple-500 outline-none transition-colors">
                            <button onclick="handleNext('k1', 1)" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl mt-2 active:scale-95 transition-transform">Далее</button>
                        </div>
                    </div>
                `;
            } else if (state.step === 2) {
                container.innerHTML = `
                    <div class="step-transition">
                        <div class="bg-purple-50 p-6 rounded-3xl mb-8 border border-purple-100">
                            <h2 class="font-bold text-purple-800 mb-2 text-lg">Шаг 2: Терапия</h2>
                            <p class="text-sm text-purple-700 leading-relaxed">
                                Посетите симпозиум: <strong>«Трансформация подходов к реабилитации после инсульта: клиническая ценность протокола Центрис в профилактике инвалидизации»</strong>. Докладчик сообщит вам ключ №2.
                            </p>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-slate-400 ml-1">КЛЮЧ №2</label>
                            <input id="k2" type="text" placeholder="Введите слово..." class="w-full border-2 border-purple-100 rounded-2xl p-4 focus:border-purple-500 outline-none transition-colors">
                            <button onclick="handleNext('k2', 2)" class="w-full purple-gradient text-white font-bold py-4 rounded-2xl mt-2 active:scale-95 transition-transform">Далее</button>
                        </div>
                    </div>
                `;
            } else if (state.step === 3) {
                container.innerHTML = `
                    <div class="step-transition">
                        <div class="bg-purple-50 p-6 rounded-3xl mb-8 border border-purple-100">
                            <h2 class="font-bold text-purple-800 mb-2 text-lg">Шаг 3: Реабилитация</h2>
                            <p class="text-sm text-purple-700 leading-relaxed">
                                Решите ребус на стенде компании <strong>«Nutricia»</strong> и получите ключ №3.
                            </p>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-slate-400 ml-1">КЛЮЧ №3</label>
                            <input id="k3" type="text" placeholder="Введите слово..." class="w-full border-2 border-purple-100 rounded-2xl p-4 focus:border-purple-500 outline-none transition-colors">
                            <button onclick="handleNext('k3', 3)" class="w-full purple-gradient text-white font-bold py-4 rounded-2xl mt-2 active:scale-95 transition-transform">Завершить квест</button>
                        </div>
                    </div>
                `;
            } else if (state.step === 4) {
                // Финальный экран
                if (state.isWinner) {
                    container.innerHTML = `
                        <div class="text-center step-transition">
                            <div class="mb-6 inline-flex items-center justify-center w-24 h-24 bg-green-100 text-green-500 rounded-full">
                                <i class="fa-solid fa-circle-check text-6xl"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-slate-800 mb-4">Поздравляем!</h2>
                            <p class="text-slate-600 leading-relaxed mb-8">
                                Мы с вами убедились, что <strong>Nutridrink</strong> улучшает восстановление после инсульта. Покажите этот экран менеджеру на стенде, чтобы получить подарок.
                            </p>
                            <button onclick="restart()" class="text-purple-600 font-semibold text-sm underline">Начать сначала</button>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="text-center step-transition">
                            <div class="mb-6 inline-flex items-center justify-center w-24 h-24 bg-purple-100 text-purple-600 rounded-full">
                                <i class="fa-solid fa-envelope-open-text text-5xl"></i>
                            </div>
                            <h2 class="text-xl font-bold text-slate-800 mb-4">Спасибо за участие!</h2>
                            <p class="text-slate-600 leading-relaxed mb-8">
                                Мы с вами убедились, что <strong>Nutridrink</strong> улучшает восстановление после инсульта. Справочник придет вам на почту, указанную при регистрации, в ближайшее время.
                            </p>
                            <button onclick="restart()" class="text-purple-600 font-semibold text-sm underline">Вернуться в начало</button>
                        </div>
                    `;
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
